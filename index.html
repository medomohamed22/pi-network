<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Trading Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #020617;
            --surface: rgba(15, 23, 42, 0.8);
            --primary: #3b82f6; 
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: var(--text-main); 
            margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 2rem 1rem; box-sizing: border-box;
        }

        .bot-container { 
            background: var(--surface); padding: 2.5rem 2rem; 
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            width: 100%; max-width: 450px; position: relative; overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { margin: 0; font-size: 2.2rem; font-weight: 800; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; color: transparent; }
        .header p { color: var(--text-muted); margin-top: 5px; font-size: 0.95rem; }

        .status-badge {
            display: inline-block; padding: 6px 16px; border-radius: 99px;
            font-weight: 700; font-size: 0.85rem; transition: 0.3s; margin-top: 10px;
            background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger);
        }
        .status-badge.active {
            background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .ai-banner {
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 20px;
            color: #93c5fd; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 2rem; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        .stat-card p { margin: 5px 0 0; color: var(--text-muted); font-size: 0.8rem; }
        .highlight-price { color: #a78bfa !important; }

        .form-group { margin-bottom: 1.2rem; text-align: right; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.9rem;}
        input { 
            width: 100%; padding: 14px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.4); border-radius: 12px; color: white;
            box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        .btn-toggle { 
            width: 100%; padding: 16px; border-radius: 14px; font-size: 1.1rem; 
            cursor: pointer; font-weight: 800; transition: 0.3s; border: none;
            background: linear-gradient(135deg, var(--success), #059669); color: white;
            margin-top: 10px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        .btn-toggle.stop { background: linear-gradient(135deg, var(--danger), #b91c1c); box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); }

        #toast {
            visibility: hidden; min-width: 250px; background: rgba(15, 23, 42, 0.95); color: #fff;
            text-align: center; border-radius: 99px; padding: 14px 24px;
            position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%);
            bottom: 30px; font-size: 0.95rem; border: 1px solid var(--border); font-weight: 700;
        }
        #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 3s; }

        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

    <div class="bot-container">
        <div class="header">
            <h1>Smart DEX Bot 🧠</h1>
            <p>صانع السوق الآلي - يحلل الدفتر ويحدد الأسعار</p>
            <div id="botStatus" class="status-badge">الذكاء الاصطناعي متوقف</div>
        </div>

        <div class="ai-banner">
            ✨ البوت سيقوم بقراءة أفضل الأسعار حالياً ويزايد عليها تلقائياً لضمان الربح.
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="lastExecutedPrice" class="highlight-price">-</h3>
                <p>آخر سعر تم تنفيذه (Pi)</p>
            </div>
            <div class="stat-card">
                <h3 id="currentAction" style="color: var(--primary);">-</h3>
                <p>العملية القادمة</p>
            </div>
        </div>

        <div class="form-group">
            <label>باسورد الأدمن (للتأكيد)</label>
            <input type="password" id="adminToken" placeholder="أدخل الباسورد السري...">
        </div>

        <div class="form-group">
            <label>رمز التوكين للتداول</label>
            <input type="text" id="assetCode" value="DONATE">
        </div>

        <div class="form-group">
            <label>كمية التداول في كل صفقة (Token)</label>
            <input type="number" id="tradeAmount" value="5">
        </div>

        <button id="btnToggleBot" class="btn-toggle">▶ تشغيل الرادار التلقائي</button>
    </div>

    <div id="toast"></div>

    <script>
        const BACKEND_URL = ""; 
        let botInterval = null;
        let isRunning = false;
        let nextAction = "buy_token"; // البوت يشتري أولاً ثم يبيع

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3400);
        }

        async function executeTrade() {
            const adminToken = document.getElementById("adminToken").value.trim();
            const assetCode = document.getElementById("assetCode").value.trim().toUpperCase();
            const amount = document.getElementById("tradeAmount").value;

            if (!adminToken) {
                toggleBot(); 
                return showToast("⚠️ توقف البوت: باسورد الأدمن مفقود.");
            }

            const actionText = nextAction === "buy_token" ? "شراء 📉" : "بيع 📈";
            document.getElementById("currentAction").innerText = actionText;

            try {
                const res = await fetch(BACKEND_URL + "/.netlify/functions/bot_trade", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ adminToken, assetCode, amount, action: nextAction })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // عرض السعر الذي حدده البوت ونجح في التنفيذ به
                    document.getElementById("lastExecutedPrice").innerText = data.executedPrice;
                    showToast(`✅ تم التنفيذ! عملية ${actionText} تمت بسعر ${data.executedPrice} Pi.`);
                    
                    // التبديل للعملية العكسية لتحقيق الربح في الدورة القادمة
                    nextAction = nextAction === "buy_token" ? "sell_token" : "buy_token";
                } else {
                    console.error("Error:", data.error);
                }
            } catch (e) {
                console.error("Network Error:", e);
            }
        }

        function toggleBot() {
            const btn = document.getElementById("btnToggleBot");
            const statusBadge = document.getElementById("botStatus");

            if (isRunning) {
                clearInterval(botInterval);
                isRunning = false;
                btn.innerText = "▶ تشغيل الرادار التلقائي";
                btn.classList.remove("stop");
                statusBadge.innerText = "الذكاء الاصطناعي متوقف";
                statusBadge.classList.remove("active");
                document.getElementById("currentAction").innerText = "-";
                showToast("🛑 تم إيقاف البوت بنجاح.");
            } else {
                if (!document.getElementById("adminToken").value.trim()) {
                    return showToast("يرجى إدخال باسورد الأدمن أولاً.");
                }

                isRunning = true;
                btn.innerText = "🛑 إيقاف الرادار";
                btn.classList.add("stop");
                statusBadge.innerText = "البوت متصل بالسوق ويحلل... (لا تغلق الصفحة)";
                statusBadge.classList.add("active");
                showToast("🚀 بدأ العمل! البوت يقرأ دفتر الطلبات كل 20 ثانية.");

                // أول عملية فورية، ثم دورة كل 20 ثانية
                executeTrade();
                botInterval = setInterval(executeTrade, 20000); 
            }
        }

        document.getElementById("btnToggleBot").addEventListener("click", toggleBot);
    </script>
</body>
</html>
