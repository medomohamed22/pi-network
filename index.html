<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot | التداول الآلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6; 
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 2rem 1rem;
        }

        .bot-container { 
            background: var(--surface); 
            padding: 2.5rem 2rem; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            width: 100%; 
            max-width: 500px; 
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { margin: 0; font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; color: transparent; }
        .header p { color: var(--text-muted); margin-top: 5px; }

        .status-badge {
            display: inline-block; padding: 6px 16px; border-radius: 99px;
            font-weight: 700; font-size: 0.9rem; transition: 0.3s;
            background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger);
        }
        .status-badge.active {
            background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success);
            animation: pulse 2s infinite;
        }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border);
        }
        .stat-card h3 { margin: 0; font-size: 1.8rem; color: var(--text-main); }
        .stat-card p { margin: 5px 0 0; color: var(--text-muted); font-size: 0.85rem; }

        .form-group { margin-bottom: 1.2rem; text-align: right; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); font-size: 0.9rem;}
        input { 
            width: 100%; padding: 14px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.3); border-radius: 12px; color: white;
            box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-toggle { 
            width: 100%; padding: 18px; border-radius: 16px; font-size: 1.2rem; 
            cursor: pointer; font-weight: 800; transition: 0.3s; border: none;
            background: linear-gradient(135deg, var(--success), #059669); color: white;
            margin-top: 10px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        .btn-toggle.stop {
            background: linear-gradient(135deg, var(--danger), #b91c1c);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        #toast {
            visibility: hidden; min-width: 250px; background: rgba(0,0,0,0.9); color: #fff;
            text-align: center; border-radius: 12px; padding: 16px;
            position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%);
            bottom: 30px; font-size: 0.95rem; border: 1px solid var(--border);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

    <div class="bot-container">
        <div class="header">
            <h1>AutoBot DEX 🤖</h1>
            <p>صانع السوق الآلي لشبكة Pi Testnet</p>
            <div id="botStatus" class="status-badge">البوت متوقف</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="tradeCount">0</h3>
                <p>عمليات ناجحة</p>
            </div>
            <div class="stat-card">
                <h3 id="currentAction" style="color: var(--primary);">-</h3>
                <p>العملية الحالية</p>
            </div>
        </div>

        <div class="form-group">
            <label>باسورد الأدمن (مطلوب للتنفيذ)</label>
            <input type="password" id="adminToken" placeholder="أدخل الباسورد السري...">
        </div>

        <div class="form-group">
            <label>رمز التوكين (مثال: DONATE أو DEALWAY)</label>
            <input type="text" id="assetCode" value="DONATE">
        </div>

        <div class="row">
            <div class="form-group">
                <label>سعر الشراء (منخفض)</label>
                <input type="number" id="buyPrice" value="0.05" step="0.01">
            </div>
            <div class="form-group">
                <label>سعر البيع (مرتفع)</label>
                <input type="number" id="sellPrice" value="0.06" step="0.01">
            </div>
        </div>

        <div class="form-group">
            <label>كمية التداول في كل صفقة</label>
            <input type="number" id="tradeAmount" value="10">
        </div>

        <button id="btnToggleBot" class="btn-toggle">▶ بدء التداول الآلي</button>
    </div>

    <div id="toast"></div>

    <script>
        // إعدادات البوت
        const BACKEND_URL = ""; 
        let botInterval = null;
        let isRunning = false;
        let successfulTrades = 0;
        let nextAction = "buy_token"; // البوت سيبدأ بوضع طلب شراء، ثم طلب بيع، وهكذا

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        async function executeTrade() {
            const adminToken = document.getElementById("adminToken").value.trim();
            const assetCode = document.getElementById("assetCode").value.trim().toUpperCase();
            const amount = document.getElementById("tradeAmount").value;
            const buyPrice = document.getElementById("buyPrice").value;
            const sellPrice = document.getElementById("sellPrice").value;

            if (!adminToken) {
                toggleBot(); // إيقاف البوت
                return showToast("⚠️ تم إيقاف البوت: باسورد الأدمن مفقود.");
            }

            // تحديد السعر بناءً على العملية الحالية
            const currentPrice = nextAction === "buy_token" ? buyPrice : sellPrice;
            const actionText = nextAction === "buy_token" ? "شراء 📉" : "بيع 📈";
            
            document.getElementById("currentAction").innerText = actionText;

            try {
                const res = await fetch(BACKEND_URL + "/.netlify/functions/bot_trade", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        adminToken, assetCode, amount, price: currentPrice, action: nextAction
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successfulTrades++;
                    document.getElementById("tradeCount").innerText = successfulTrades;
                    showToast(`✅ نجاح طلب ${actionText} لـ ${amount} توكين.`);
                    
                    // تبديل العملية للمرة القادمة (من شراء لبيع والعكس)
                    nextAction = nextAction === "buy_token" ? "sell_token" : "buy_token";
                } else {
                    console.error("Bot Error:", data.error);
                }
            } catch (e) {
                console.error("Network Error:", e);
            }
        }

        function toggleBot() {
            const btn = document.getElementById("btnToggleBot");
            const statusBadge = document.getElementById("botStatus");

            if (isRunning) {
                // إيقاف البوت
                clearInterval(botInterval);
                isRunning = false;
                btn.innerText = "▶ بدء التداول الآلي";
                btn.classList.remove("stop");
                statusBadge.innerText = "البوت متوقف";
                statusBadge.classList.remove("active");
                document.getElementById("currentAction").innerText = "-";
                showToast("🛑 تم إيقاف البوت بنجاح.");
            } else {
                // التأكد من البيانات قبل التشغيل
                if (!document.getElementById("adminToken").value.trim()) {
                    return showToast("يرجى إدخال باسورد الأدمن أولاً.");
                }

                // تشغيل البوت
                isRunning = true;
                btn.innerText = "🛑 إيقاف التداول";
                btn.classList.add("stop");
                statusBadge.innerText = "البوت يعمل (التبويب يجب أن يظل مفتوحاً)";
                statusBadge.classList.add("active");
                showToast("🚀 تم تشغيل البوت! سيقوم بوضع أوامر كل 20 ثانية.");

                // تنفيذ أول عملية فوراً، ثم تكرارها كل 20 ثانية (20000 مللي ثانية)
                executeTrade();
                botInterval = setInterval(executeTrade, 20000); 
            }
        }

        document.getElementById("btnToggleBot").addEventListener("click", toggleBot);
    </script>
</body>
</html>
